<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;800&display=swap"
        media="print"
        onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;800&display=swap">
    </noscript>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="nav__logo">PLENI</a>

        <ul class="nav__links">
            <li><a href="index.html" class="nav__link">
                    <span class="text-hover">Home</span>
                    <span class="text-original">Home</span>
                </a></li>
            <li><a href="shop.html" class="nav__link">
                    <span class="text-hover">Shop</span>
                    <span class="text-original">Shop</span>
                </a></li>
            <li><a href="contact.html" class="nav__link">
                    <span class="text-hover">Contact</span>
                    <span class="text-original">Contact</span>
                </a></li>
        </ul>
    </nav>

    <section class="contact-section" id="contact">
        <form class="form-grid">
            <h2 class="contact__title contact-grid-item">Let's talk about scent.</h2>
            <div class="form__group contact-grid-item" id="form-name">
                <input type="text" id="name" class="form__input" placeholder="What should we call you?" required>
            </div>

            <div class="form__group contact-grid-item" id="form-email">
                <input type="email" id="email" class="form__input" placeholder="your@email.com" required>
            </div>
            <div class="form__group contact-grid-item" id="form-message">
                <div class="contact-message-container">
                    <textarea id="message" class="form__textarea" placeholder="Tell us what's on your mind..." rows="5"
                        required></textarea>
                    <div class="btn-wrap">
                        <button type="submit" class="btn btn-primary">Send Message</button>
                        <span class="corner top-left"></span>
                        <span class="corner top-right"></span>
                        <span class="corner bottom-left"></span>
                        <span class="corner bottom-right"></span>
                    </div>
                </div>
            </div>

            <div class="contact-social contact-grid-item">
                <div class="social-links-container">
                    <div class="social-cap-top"></div>
                    <div class="social-links">
                        <a href="#" class="social-link">Instagram</a>
                        <a href="#" class="social-link">TikTok</a>
                        <a href="#" class="social-link">Pinterest</a>
                    </div>
                </div>
            </div>

            <div class="contact-extra extra2">

            </div>

        </form>
    </section>

    <footer id="footer">
        <div class="footer__inner">
            <div class="footer__links">
                <nav class="footer__nav">
                    <a href="index.html" class="footer__link">Home</a>
                    <a href="shop.html" class="footer__link">Shop</a>
                    <a href="contact.html" class="footer__link">Contact</a>
                </nav>

            </div>
            <div class="footer__logo-block">
                <div class="footer__logo">PLENI</div>
                <p class="footer__tagline">Abundance in every scent.</p>
            </div>
        </div>
        <div class="footer__bottom">
            <p class="footer__copy">© 2025 Pleni. All rights reserved.</p>
            <p class="footer__copy">Made with bold intentions.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
