<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Page</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;800&display=swap"
        media="print"
        onload="this.media='all'">
  <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;800&display=swap">
  </noscript>
</head>
<body>
  <nav class="navbar">
      <a href="index.html" class="nav__logo">PLENI</a>

      <ul class="nav__links">
          <li><a href="index.html" class="nav__link">
                  <span class="text-hover">Home</span>
                  <span class="text-original">Home</span>
              </a></li>
          <li><a href="shop.html" class="nav__link">
                  <span class="text-hover">Shop</span>
                  <span class="text-original">Shop</span>
              </a></li>
          <li><a href="contact.html" class="nav__link">
                  <span class="text-hover">Contact</span>
                  <span class="text-original">Contact</span>
              </a></li>
      </ul>
  </nav>

  <div class="cursor"></div>

  <section class="shop-hero" id="shop-hero">
    <h2 class="shop-hero-text">SHOP THE <br> SCENT</h2>
  </section>

<section class="shop-collection-container">
        <div class="collection-header">
            <h1>COLLECTION</h1>
        </div>
        <div class="collection-content">
            <div class="collection-item">
                <h1 class="img-header">
                    VELVET STATIC
                </h1>
                <img src="images/collection2.png" alt="Collection Item 1" class="collection-img">
                <div class="item-action-bar">
                    <span class="item-price">$145</span>
                    <button class="btn btn--primary add-to-cart-btn">ADD TO CART</button>
                </div>                
            </div>
            <div class="collection-item">
                <h1 class="img-header">
                    ACID BLOOM
                </h1>
                <img src="images/collection2.png" alt="Collection Item 2" class="collection-img">
                <div class="item-action-bar">
                    <span class="item-price">$145</span>
                    <button class="btn btn--primary add-to-cart-btn">ADD TO CART</button>
                </div>
            </div>
            <div class="collection-item">
                <h1 class="img-header">
                    NEON MOSS
                </h1>
                <img src="images/collection2.png" alt="Collection Item 3" class="collection-img">
                <div class="item-action-bar">
                    <span class="item-price">$145</span>
                    <button class="btn btn--primary add-to-cart-btn">ADD TO CART</button>
                </div>
            </div>
        </div>
    </section>

   <section class="shop-subscribe-section">
        <div class="shop-subscribe-inner">
            <h3 class="shop-subscribe-title">Join The Pulse</h3>
            <p class="shop-subscribe-subtitle">Subscribers get first access to limited drops.</p>
            <form class="shop-subscribe-form">
                <input class="shop-subscribe-input" type="email" placeholder="YOUR@EMAIL.COM" required>
                <button type="submit" class="btn btn--primary">Subscribe</button>
            </form>
        </div>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
